<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teleprompter</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

header {
  position: fixed;
  top: 0;
  width: 100%;
  background: #111;
  color: white;
  padding: 10px;
  z-index: 10;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

button {
  font-size: 16px;
  padding: 8px;
}

input[type="range"] {
  width: 100px;
}

#editor {
  margin-top: 120px;
  padding: 10px;
  min-height: 300px;
  outline: none;
}

#presenter {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  overflow: hidden;
}

#textContainer {
  position: absolute;
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
  left: 0;
  right: 0;
  box-sizing: border-box;
  text-align: center;
  font-size: 32px;
  line-height: 1.6;
  padding: 40px 20px;

  overflow-wrap: break-word;
  word-break: break-word;
}
</style>
</head>

<body>

<header>
  <button onclick="color('red')">🔴</button>
  <button onclick="color('yellow')">🟡</button>
  <button onclick="color('cyan')">🔵</button>
  <button onclick="clearColor()">🚫🎨</button>

  <input type="range" min="14" max="40" value="20" oninput="setEditorSize(this.value)">
  <input type="range" min="20" max="80" value="32" oninput="setPresenterSize(this.value)">

  <button onclick="presentar()">▶ Presentar</button>
</header>

<div id="editor" contenteditable="true"></div>

<div id="presenter" onclick="toggleScroll()">
  <div id="textContainer"></div>
</div>

<script>
let editor = document.getElementById("editor");
let presenter = document.getElementById("presenter");
let textContainer = document.getElementById("textContainer");

let scrollInterval;
let scrolling = false;

let fontSizeEditor = 20;
let fontSizePresenter = 32;

let minutos = 5;

// ======================
// FORMATOS
// ======================
function color(c) {
  document.execCommand("foreColor", false, c);
  guardar();
}

function clearColor() {
  document.execCommand("removeFormat", false, null);
  guardar();
}

// ======================
// TAMAÑOS
// ======================
function setEditorSize(size) {
  fontSizeEditor = size;
  editor.style.fontSize = size + "px";
  guardar();
}

function setPresenterSize(size) {
  fontSizePresenter = size;
  textContainer.style.fontSize = size + "px";

  // 🔥 OPCIÓN B: detener scroll al cambiar tamaño
  detenerScroll();
}

// ======================
// PRESENTADOR
// ======================
function presentar() {
  presenter.style.display = "block";
  textContainer.innerHTML = editor.innerHTML;
  textContainer.style.fontSize = fontSizePresenter + "px";

  window.scrollTo(0, 0);
  iniciarScroll();
}

function iniciarScroll() {
  detenerScroll();

  let totalHeight = textContainer.scrollHeight - window.innerHeight;
  let duration = minutos * 60 * 1000;
  let velocidad = totalHeight / duration;

  scrolling = true;

  scrollInterval = setInterval(() => {
    window.scrollBy(0, velocidad * 16);
  }, 16);
}

function detenerScroll() {
  clearInterval(scrollInterval);
  scrolling = false;
}

function toggleScroll() {
  if (scrolling) {
    detenerScroll();
  } else {
    iniciarScroll();
  }
}

// ======================
// GUARDADO LOCAL
// ======================
function guardar() {
  const data = {
    texto: editor.innerHTML,
    fontSizeEditor,
    fontSizePresenter
  };
  localStorage.setItem("teleprompter", JSON.stringify(data));
}

// cargar
window.onload = () => {
  let data = localStorage.getItem("teleprompter");

  if (data) {
    let parsed = JSON.parse(data);
    editor.innerHTML = parsed.texto || "";
    fontSizeEditor = parsed.fontSizeEditor || 20;
    fontSizePresenter = parsed.fontSizePresenter || 32;
  }

  editor.style.fontSize = fontSizeEditor + "px";
};
</script>

</body>
</html>
